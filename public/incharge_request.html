<!DOCTYPE html>
<html>

<head>

<title>Request Details</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#eef2f7;
margin:0;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:230px;
height:100%;
background:#0f172a;
color:white;
padding-top:20px;
}

.sidebar h4{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
}

.sidebar a:hover{
background:#1e293b;
}

.logout{
position:absolute;
bottom:20px;
width:100%;
}

.logout-btn{
display:block;
margin:10px 20px;
padding:10px;
text-align:center;
background:#ef4444;
color:white;
border-radius:8px;
text-decoration:none;
}

.main{
margin-left:230px;
padding:40px;
}

.card{
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.qty-input{
width:90px;
}

.issue-btn{
background:linear-gradient(135deg,#22c55e,#16a34a);
border:none;
padding:10px 20px;
border-radius:8px;
color:white;
font-weight:500;
}

.issue-btn:hover{
opacity:0.9;
}

.status-box{
margin-top:10px;
font-weight:600;
color:#16a34a;
}

</style>

</head>

<body>

<div class="sidebar">

<h4>CIT Assets</h4>

<a href="incharge_dashboard.html">Dashboard</a>
<a href="student_requests.html">Student Requests</a>
<a href="scan_qr.html">Scan QR</a>

<div class="logout">
<a href="#" class="logout-btn" onclick="logout()">Logout</a>
</div>

</div>


<div class="main">

<div class="d-flex justify-content-between align-items-center mb-4">

<h2 class="fw-bold">Request Details</h2>

<a href="student_requests.html" class="btn btn-secondary">
← Back
</a>

</div>


<div class="card p-4 mb-4">

<h5 class="mb-3">Student Information</h5>

<p><b>Name:</b> <span id="name"></span></p>
<p><b>Email:</b> <span id="email"></span></p>
<p><b>Department:</b> <span id="dept"></span></p>
<p><b>Contact:</b> <span id="contact"></span></p>

<p id="statusBox" class="status-box"></p>

</div>


<div class="card p-4">

<h5 class="mb-3">Equipment Details</h5>

<div class="table-responsive">

<table class="table">

<thead class="table-dark">

<tr>
<th>Equipment</th>
<th>Requested</th>
<th id="actionHeader">Give Quantity</th>
</tr>

</thead>

<tbody id="itemsTable"></tbody>

</table>

</div>

<button id="issueBtn" class="issue-btn mt-3" onclick="confirmIssue()">
Confirm Issue
</button>

</div>

</div>


<script>

function logout(){
if(confirm("Logout?")){
localStorage.clear();
window.location.href="login.html";
}
}

const params = new URLSearchParams(window.location.search);
const requestId = params.get("id");

let requestItems=[];
let requestStatus="";

fetch(`/api/incharge/request/${requestId}`)
.then(res=>res.json())
.then(data=>{

if(!data.success){
alert("Invalid request");
window.location.href="student_requests.html";
return;
}

requestStatus = data.student.status;

document.getElementById("name").innerText=data.student.name;
document.getElementById("email").innerText=data.student.email;
document.getElementById("dept").innerText=data.student.department;
document.getElementById("contact").innerText=data.student.contact_number;

const table=document.getElementById("itemsTable");
table.innerHTML="";

data.items.forEach((item,index)=>{

requestItems.push(item);

if(requestStatus === "pending"){

table.innerHTML+=`
<tr>
<td>${item.equipment_name}</td>
<td>${item.quantity}</td>
<td>
<input type="number"
min="0"
max="${item.quantity}"
value="0"
class="form-control qty-input"
id="give-${index}">
</td>
</tr>
`;

}

else{

table.innerHTML+=`
<tr>
<td>${item.equipment_name}</td>
<td>${item.quantity}</td>
<td>${item.issued_quantity || 0}</td>
</tr>
`;

}

});

const statusBox=document.getElementById("statusBox");
const issueBtn=document.getElementById("issueBtn");
const header=document.getElementById("actionHeader");

if(requestStatus==="approved"){

header.innerText="Issued Quantity";
issueBtn.style.display="none";
statusBox.innerText="Status: Equipment Issued";

}

if(requestStatus==="returned"){

header.innerText="Issued Quantity";
issueBtn.style.display="none";
statusBox.innerText="Status: Equipment Returned";

}

});


function confirmIssue(){

const issued=[];
let totalIssued=0;

for(let i=0;i<requestItems.length;i++){

const item=requestItems[i];
const qty=parseInt(document.getElementById(`give-${i}`).value)||0;

if(qty > item.quantity){
alert("Cannot issue more than requested quantity");
return;
}

totalIssued+=qty;

issued.push({
equipment_id:item.equipment_id,
issued_quantity:qty
});

}

if(totalIssued===0){
alert("Please enter quantity to issue");
return;
}

fetch("/api/incharge/issue",{

method:"POST",
headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
request_id:requestId,
items:issued
})

})
.then(res=>res.json())
.then(data=>{

alert("Equipment Issued Successfully");

window.location.href="student_requests.html";

});

}

</script>

</body>

</html>

<!DOCTYPE html>
<html>

<head>

<title>Request Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#f4f6f9;
margin:0;
}

/* SIDEBAR */

.sidebar{
height:100vh;
background:linear-gradient(180deg,#1e293b,#0f172a);
color:white;
padding:25px;
}

.sidebar h3{
color:#38bdf8;
margin-bottom:30px;
font-weight:600;
}

.menu-item{
padding:12px;
margin-bottom:10px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.menu-item:hover{
background:#334155;
}

/* MAIN */

.dashboard{
padding:40px;
}

/* CARD */

.card-box{
background:rgba(0, 162, 255, 0.123);
padding:30px;
border-radius:14px;
box-shadow:0 8px 18px rgba(0,0,0,0.08);
}

/* DETAILS GRID */

.detail-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
margin-top:20px;
}

.detail{
background:#f8fafc;
padding:15px;
border-radius:10px;
}

/* STATUS BADGE */

.status{
display:inline-flex;
align-items:center;
gap:6px;
padding:6px 14px;
border-radius:20px;
font-size:13px;
font-weight:600;
letter-spacing:0.3px;
}

/* PENDING */

.pending{
background:rgba(245,158,11,0.12);
color:#b45309;
border:1px solid rgba(245,158,11,0.25);
}

/* APPROVED */

.approved{
background:rgba(16,185,129,0.12);
color:#047857;
border:1px solid rgba(16,185,129,0.25);
}

/* REJECTED */

.rejected{
background:rgba(239,68,68,0.12);
color:#b91c1c;
border:1px solid rgba(239,68,68,0.25);
}

/* INVOICE LINK */

.invoice-link{
color:#2563eb;
text-decoration:none;
font-weight:500;
}

.invoice-link:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="container-fluid">

<div class="row">

<!-- SIDEBAR -->

<div class="col-md-2 sidebar">

<h3>AssetChain</h3>

<div class="menu-item" onclick="goDashboard()">Dashboard</div>

<div class="menu-item" onclick="goRequests()">Equipment Requests</div>

<div class="menu-item" onclick="logout()">Logout</div>

</div>


<!-- MAIN -->

<div class="col-md-10 dashboard">

<div class="d-flex justify-content-between align-items-center">

<h2>Request Details</h2>

<button class="btn btn-secondary" onclick="goBack()">← Back</button>

</div>


<div class="card-box mt-4">

<div class="detail-grid">

<div class="detail">
<b>Product</b><br>
<span id="product"></span>
</div>

<div class="detail">
<b>Requested Quantity</b><br>
<span id="requested_qty"></span>
</div>

<div class="detail">
<b>Existing Quantity</b><br>
<span id="existing_qty"></span>
</div>

<div class="detail">
<b>Estimated Price</b><br>
₹ <span id="price"></span>
</div>

<div class="detail">
<b>Status</b><br>
<span id="status" class="status"></span>
</div>

<div class="detail">
<b>Reject Reason</b><br>
<span id="reject_reason"></span>
</div>

<div class="detail">
<b>Reminder Time</b><br>
<span id="reminder_time"></span>
</div>

<div class="detail">
<b>Invoice</b><br>
<a id="invoice_link" class="invoice-link" target="_blank">
View Invoice
</a>
</div>

</div>

</div>

</div>

</div>

</div>


<script src="/js/request_status.js"></script>

<script>

function goBack(){
window.location.href="equipment_request.html";
}

function goDashboard(){
window.location.href="incharge_dashboard.html";
}

function goRequests(){
window.location.href="equipment_request.html";
}

function logout(){
localStorage.clear();
window.location.href="login.html";
}

</script>

</body>

</html>

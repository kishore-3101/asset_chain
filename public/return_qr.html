<!DOCTYPE html>
<html>

<head>

<title>Return QR</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#eef2f7;
margin:0;
}

/* Sidebar */

.sidebar{
position:fixed;
left:0;
top:0;
width:230px;
height:100%;
background:#0f172a;
color:white;
padding-top:20px;
}

.sidebar h4{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
}

.sidebar a:hover{
background:#1e293b;
}

/* Logout */

.logout{
position:absolute;
bottom:20px;
width:100%;
}

.logout-btn{
display:block;
margin:10px 20px;
padding:10px;
text-align:center;
background:#ef4444;
color:white;
border-radius:8px;
text-decoration:none;
}

/* Main */

.main{
margin-left:230px;
padding:40px;
}

/* QR Card */

.qr-card{
background:white;
border-radius:14px;
padding:40px;
text-align:center;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
max-width:500px;
margin:auto;
}

.qr-card img{
border:10px solid #f1f5f9;
border-radius:12px;
}

.qr-title{
font-weight:600;
margin-bottom:20px;
}

.qr-note{
color:#6b7280;
margin-top:15px;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h4>CIT Assets</h4>

<a href="student_dashboard.html">Dashboard</a>
<a href="student_equipment.html">Lab Equipment</a>
<a href="cart.html">Cart</a>
<a href="previous_requests.html">My Requests</a>

<div class="logout">
<a href="#" class="logout-btn" onclick="logout()">Logout</a>
</div>

</div>


<!-- Main Content -->

<div class="main">

<div class="d-flex justify-content-between align-items-center mb-4">

<h2 class="fw-bold">Return Equipment</h2>

<button class="btn btn-secondary" onclick="goBack()">
← Back
</button>

</div>

<div class="qr-card">

<h4 class="qr-title">Return QR Code</h4>

<img id="qrImage" width="280">

<p class="qr-note">
Show this QR to the lab incharge while returning equipment
</p>

</div>

</div>


<script>

/* Logout */

function logout(){

if(confirm("Are you sure you want to logout?")){
localStorage.clear();
window.location.href="login.html";
}

}

/* Back */

function goBack(){
window.history.back();
}

/* Load Return QR */

const params = new URLSearchParams(window.location.search);
const requestId = params.get("id");

fetch(`/api/student/return-qr/${requestId}`)
.then(res=>res.json())
.then(data=>{

if(!data.success){

alert(data.message || "Return QR not available yet");
window.history.back();
return;

}

document.getElementById("qrImage").src = data.return_qr;

})
.catch(err=>{
console.error(err);
alert("Server error");
});

</script>

</body>

</html>

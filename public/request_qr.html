<!DOCTYPE html>
<html>

<head>

<title>Request QR</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
font-family:Arial;
background:#f4f6f9;
text-align:center;
padding-top:100px;
}

img{
margin-top:20px;
}

</style>

</head>

<body>

<h2>Your Equipment Request QR</h2>

<p>Show this QR to the Lab Incharge</p>

<img id="qrImage" width="300">

<br><br>

<button class="btn btn-primary" onclick="goBack()">Back to Dashboard</button>

<script>

const params = new URLSearchParams(window.location.search);
const requestId = params.get("id");

fetch(`/api/student/request-qr/${requestId}`)
.then(res=>res.json())
.then(data=>{

if(!data.success){
alert("QR not found");
return;
}

document.getElementById("qrImage").src = data.qr;

});

function goBack(){
window.location.href="student_dashboard.html";
}

</script>

</body>

</html>

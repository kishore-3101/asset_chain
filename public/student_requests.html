<!DOCTYPE html>
<html>

<head>

<title>Student Requests</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#eef2f7;
margin:0;
}

/* Sidebar */

.sidebar{
position:fixed;
left:0;
top:0;
width:230px;
height:100%;
background:#0f172a;
color:white;
padding-top:20px;
}

.sidebar h4{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
}

.sidebar a:hover{
background:#1e293b;
}

/* Logout */

.logout{
position:absolute;
bottom:20px;
width:100%;
}

.logout-btn{
display:block;
margin:10px 20px;
padding:10px;
text-align:center;
background:#ef4444;
color:white;
border-radius:8px;
text-decoration:none;
}

/* Main */

.main{
margin-left:230px;
padding:40px;
}

/* Table Card */

.table-card{
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

/* Status */

.status-pending{
background:#facc15;
padding:5px 10px;
border-radius:6px;
font-size:13px;
}

.status-approved{
background:#22c55e;
color:white;
padding:5px 10px;
border-radius:6px;
font-size:13px;
}

.status-rejected{
background:#ef4444;
color:white;
padding:5px 10px;
border-radius:6px;
font-size:13px;
}

/* Buttons */

.view-btn{
background:linear-gradient(135deg,#6366f1,#4f46e5);
border:none;
color:white;
padding:6px 14px;
border-radius:8px;
}

.scan-btn{
background:#10b981;
border:none;
color:white;
padding:8px 16px;
border-radius:8px;
}

.scan-btn:hover{
opacity:0.9;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h4>CIT Assets</h4>

<a href="incharge_dashboard.html">Dashboard</a>
<a href="student_requests.html">Student Requests</a>

<div class="logout">
<a href="#" class="logout-btn" onclick="logout()">Logout</a>
</div>

</div>

<!-- Main -->

<div class="main">

<div class="d-flex justify-content-between align-items-center mb-4">

<h2 class="fw-bold">Student Requests</h2>

<button class="scan-btn" onclick="openScanner()">
📷 Scan QR
</button>

</div>

<div class="table-card">

<table class="table">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Student</th>
<th>Status</th>
<th>Date</th>
<th>Action</th>
</tr>

</thead>

<tbody id="reqTable"></tbody>

</table>

</div>

</div>

<script>

/* Logout */

function logout(){

if(confirm("Logout?")){
localStorage.clear();
window.location.href="login.html";
}

}

/* Load requests */

const inchargeId = localStorage.getItem("user_id");

fetch(`/api/incharge/requests/${inchargeId}`)
.then(res=>res.json())
.then(data=>{

const table = document.getElementById("reqTable");

table.innerHTML="";

data.requests.forEach(r=>{

let statusClass="";

if(r.status==="pending") statusClass="status-pending";
if(r.status==="approved") statusClass="status-approved";
if(r.status==="rejected") statusClass="status-rejected";

table.innerHTML+=`

<tr>

<td>#${r.id}</td>

<td>${r.student_name}</td>

<td>
<span class="${statusClass}">
${r.status}
</span>
</td>

<td>${new Date(r.created_at).toLocaleString()}</td>

<td>

<button class="view-btn"
onclick="openRequest(${r.id})">
View
</button>

</td>

</tr>

`;

});

})
.catch(err=>{
console.error(err);
alert("Failed to load requests");
});


/* open request */

function openRequest(id){
window.location.href=`incharge_request.html?id=${id}`;
}

/* open scanner */

function openScanner(){
window.location.href="scan_qr.html";
}

</script>

</body>

</html>

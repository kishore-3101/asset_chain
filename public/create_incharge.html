<!DOCTYPE html>
<html>

<head>

<title>Create Incharge</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#eef2ff,#f8fafc);
min-height:100vh;
padding:30px;
}

/* Header */

.page-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.page-title{
font-weight:600;
color:#1e293b;
}

/* Cards */

.card-box{
background:white;
padding:30px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
height:100%;
}

/* Form */

.form-control{
border-radius:8px;
padding:10px;
}

.form-control:focus{
border-color:#6366f1;
box-shadow:none;
}

/* Button */

.btn-create{
background:linear-gradient(135deg,#6366f1,#4f46e5);
border:none;
border-radius:8px;
padding:10px;
font-weight:500;
transition:0.3s;
}

.btn-create:hover{
transform:translateY(-2px);
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

/* Back button */

.btn-back{
background:#334155;
color:white;
border:none;
border-radius:8px;
padding:8px 16px;
}

.btn-back:hover{
background:#1e293b;
}

/* Table */

.table{
margin-top:15px;
}

.table th{
font-weight:600;
color:#334155;
}

/* Responsive */

@media(max-width:768px){

.page-header{
flex-direction:column;
align-items:flex-start;
gap:10px;
}

}

</style>

</head>

<body>

<div class="container">

<!-- Header -->

<div class="page-header">

<h2 class="page-title">Create Lab Incharge</h2>

<button class="btn btn-back" onclick="goBack()">
← Back
</button>

</div>


<div class="row g-4">

<!-- Form -->

<div class="col-lg-4 col-md-12">

<div class="card-box">

<h5 class="mb-3">Add Incharge</h5>

<input id="name" class="form-control mb-3" placeholder="Name">

<input id="email" class="form-control mb-3" placeholder="Email">

<input id="password" type="password" class="form-control mb-3" placeholder="Password">

<select id="lab" class="form-control mb-3"></select>

<button class="btn btn-create w-100" onclick="createIncharge()">
Create Incharge
</button>

<p id="message" class="mt-2"></p>

</div>

</div>


<!-- Table -->

<div class="col-lg-8 col-md-12">

<div class="card-box">

<h5>Existing Incharges</h5>

<div class="table-responsive">

<table class="table table-hover">

<thead>

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Lab</th>
</tr>

</thead>

<tbody id="incharge_table">

</tbody>

</table>

</div>

</div>

</div>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="js/head.js"></script>


<script>

function goBack(){
window.location.href="lab_inventory.html";
}

</script>

</body>

</html>

<!DOCTYPE html>
<html>

<head>

<title>View Labs</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:linear-gradient(120deg,#eef2f7,#dbeafe);
}

/* SIDEBAR */

.sidebar{
position:fixed;
left:0;
top:0;
height:100%;
width:230px;
background:#1e293b;
color:white;
padding:25px 18px;
}

.sidebar h3{
text-align:center;
margin-bottom:40px;
font-weight:600;
letter-spacing:1px;
}

.menu-item{
padding:12px;
margin-bottom:12px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.menu-item:hover{
background:#334155;
}

/* MAIN */

.main{
margin-left:250px;
padding:35px;
}

/* TITLE */

.main h2{
font-weight:600;
color:#1e293b;
margin-bottom:20px;
}

/* LAB CARDS */

.card-system{

padding:28px;
border-radius:16px;
color:white;
cursor:pointer;
transition:0.35s;
height:130px;
display:flex;
flex-direction:column;
justify-content:center;

box-shadow:0 10px 20px rgba(0,0,0,0.1);

}

.card-system:hover{

transform:translateY(-8px) scale(1.02);

box-shadow:0 18px 35px rgba(0,0,0,0.15);

}

/* DIFFERENT COLORS */

.lab1{ background:linear-gradient(135deg,#6366f1,#4f46e5); }

.lab2{ background:linear-gradient(135deg,#06b6d4,#0891b2); }

.lab3{ background:linear-gradient(135deg,#22c55e,#16a34a); }

.lab4{ background:linear-gradient(135deg,#f97316,#ea580c); }

.lab5{ background:linear-gradient(135deg,#ec4899,#db2777); }

.lab6{ background:linear-gradient(135deg,#8b5cf6,#7c3aed); }

/* CARD TEXT */

.card-system h4{
margin:0;
font-size:20px;
font-weight:600;
}

.card-system p{
margin:4px 0 0;
opacity:0.9;
font-size:14px;
}

/* BACK BUTTON */

.back-btn{
background:#64748b;
border:none;
color:white;
padding:8px 16px;
border-radius:8px;
}

.back-btn:hover{
background:#475569;
}

/* RESPONSIVE */

@media(max-width:900px){

.sidebar{
width:200px;
}

.main{
margin-left:210px;
}

}

@media(max-width:700px){

.sidebar{
position:relative;
width:100%;
height:auto;
display:flex;
justify-content:center;
}

.main{
margin-left:0;
}

}

</style>

</head>


<body>


<!-- SIDEBAR -->

<div class="sidebar">

<h3>AssetChain</h3>

<div class="menu-item" onclick="window.location.href='head_dashboard.html'">
Dashboard
</div>

<div class="menu-item" onclick="window.location.href='lab_inventory.html'">
Lab Inventory
</div>

</div>


<!-- MAIN -->

<div class="main">

<div class="d-flex justify-content-between align-items-center">

<h2>Labs</h2>

<button class="back-btn" onclick="goBack()">← Back</button>

</div>


<div class="row g-4 mt-2" id="labs_container">

</div>

</div>


<script src="/js/view_labs.js"></script>

<script>

function goBack(){
window.location.href="lab_inventory.html";
}

</script>

</body>

</html>

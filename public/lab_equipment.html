<!DOCTYPE html>
<html>

<head>

<title>Lab Equipment</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#eef2f7;
margin:0;
}

/* Sidebar */

.sidebar{
position:fixed;
left:0;
top:0;
width:230px;
height:100%;
background:#0f172a;
color:white;
padding-top:20px;
}

.sidebar h4{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
}

.sidebar a:hover{
background:#1e293b;
}

.logout{
position:absolute;
bottom:20px;
width:100%;
}

.logout-btn{
display:block;
margin:10px 20px;
padding:10px;
text-align:center;
background:#ef4444;
color:white;
border-radius:8px;
text-decoration:none;
}

/* Main */

.main{
margin-left:230px;
padding:40px;
}

/* Incharge card */

.info-card{
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
margin-bottom:30px;
}

/* Table */

.equipment-table{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.equipment-table thead{
background:#1e293b;
color:white;
}

.equipment-table th,
.equipment-table td{
padding:14px;
vertical-align:middle;
}

/* Availability badge */

.available-badge{
background:#22c55e;
color:white;
padding:4px 10px;
border-radius:8px;
font-size:13px;
}

/* Quantity input */

.qty-input{
width:70px;
text-align:center;
}

/* Add button */

.add-btn{
background:linear-gradient(135deg,#6366f1,#4f46e5);
border:none;
color:white;
padding:6px 14px;
border-radius:8px;
}

.add-btn:hover{
opacity:0.9;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h4>CIT Assets</h4>

<a href="student_dashboard.html">Dashboard</a>
<a href="student_equipment.html">Lab Equipment</a>

<div class="logout">
<a href="#" class="logout-btn" onclick="logout()">Logout</a>
</div>

</div>

<!-- Main -->

<div class="main">

<div class="d-flex justify-content-between align-items-center mb-4">

<h2 id="labTitle" class="fw-bold"></h2>

<button class="btn btn-secondary" onclick="goBack()">
← Back
</button>

</div>

<!-- Incharge Info -->

<div class="info-card">

<h5>👨‍🔬 Lab Incharge</h5><br>

<p id="inchargeName"></p>
<p id="inchargeEmail" class="text-muted"></p>

</div>

<h4 class="mb-3">Available Equipment</h4>

<div class="equipment-table">

<table class="table mb-0">

<thead>

<tr>
<th>Equipment</th>
<th>Available</th>
<th>Max per Student</th>
<th>Quantity</th>
<th>Action</th>
</tr>

</thead>

<tbody id="equipmentTable"></tbody>

</table>

</div>

</div>

<script>

/* Logout */

function logout(){

if(confirm("Are you sure you want to logout?")){

localStorage.removeItem("student");
window.location.href="login.html";

}

}

/* Get lab id */

const params = new URLSearchParams(window.location.search);
const labId = params.get("lab");

/* Fetch data */

fetch(`/api/lab_equipment/${labId}`)

.then(res=>res.json())

.then(data=>{

document.getElementById("labTitle").innerText=data.lab.lab_name;

document.getElementById("inchargeName").innerText=
"Incharge: "+(data.lab.incharge_name || "Not Assigned");

document.getElementById("inchargeEmail").innerText=
"Email: "+(data.lab.incharge_email || "-");

const table=document.getElementById("equipmentTable");

data.equipment.forEach(eq=>{

table.innerHTML+=`

<tr>

<td>${eq.equipment_name}</td>

<td>
<span class="available-badge">
${eq.available_quantity}
</span>
</td>

<td>${eq.max_per_student}</td>

<td>
<input 
type="number"
min="0"
max="${eq.max_per_student}"
value="0"
class="form-control qty-input"
id="qty-${eq.id}"
>
</td>

<td>
<button 
class="add-btn"
onclick="addToCart(${eq.id},${eq.max_per_student},'${eq.equipment_name}')"
>
Add to Cart
</button>
</td>

</tr>

`;

});

});

/* Add to cart */

function addToCart(equipmentId, maxLimit, equipmentName){

const qty = parseInt(document.getElementById(`qty-${equipmentId}`).value);

if(qty <= 0){
alert("Please select quantity");
return;
}

if(qty > maxLimit){
alert("You cannot request more than "+maxLimit+" items.");
return;
}

let cart = JSON.parse(localStorage.getItem("cart")) || [];

cart.push({
equipment_id: equipmentId,
equipment_name: equipmentName,
quantity: qty
});

localStorage.setItem("cart", JSON.stringify(cart));

alert("Added to cart");

}
function goBack(){
window.location.href="raise_request.html";
}

localStorage.setItem("current_lab", labId);

</script>

</body>

</html>

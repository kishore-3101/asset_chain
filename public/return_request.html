<!DOCTYPE html>
<html>

<head>

<title>Return Equipment</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#eef2f7;
margin:0;
}

/* Sidebar */

.sidebar{
position:fixed;
left:0;
top:0;
width:230px;
height:100%;
background:#0f172a;
color:white;
padding-top:20px;
}

.sidebar h4{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
}

.sidebar a:hover{
background:#1e293b;
}

/* Logout */

.logout{
position:absolute;
bottom:20px;
width:100%;
}

.logout-btn{
display:block;
margin:10px 20px;
padding:10px;
text-align:center;
background:#ef4444;
color:white;
border-radius:8px;
text-decoration:none;
}

/* Main */

.main{
margin-left:230px;
padding:40px;
}

/* Cards */

.card{
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

/* Inputs */

input{
width:80px;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h4>CIT Assets</h4>

<a href="incharge_dashboard.html">Dashboard</a>
<a href="student_requests.html">Student Requests</a>
<a href="scan_qr.html">Scan Pickup QR</a>
<a href="scan_return_qr.html">Scan Return QR</a>

<div class="logout">
<a href="#" class="logout-btn" onclick="logout()">Logout</a>
</div>

</div>


<!-- Main -->

<div class="main">

<h2 class="mb-4">Return Equipment</h2>


<!-- Student Info -->

<div class="card p-4 mb-4">

<h5>Student Information</h5>

<p><b>Name:</b> <span id="name"></span></p>
<p><b>Email:</b> <span id="email"></span></p>

</div>


<!-- Equipment Table -->

<div class="card p-4">

<h5 class="mb-3">Returned Equipment Details</h5>

<table class="table">

<thead class="table-dark">

<tr>
<th>Equipment</th>
<th>Issued</th>
<th>No Damage</th>
<th>Light</th>
<th>Medium</th>
<th>Heavy</th>
<th>Remove</th>
<th>Penalty ₹</th>
</tr>

</thead>

<tbody id="itemsTable"></tbody>

</table>

<button class="btn btn-success mt-3" onclick="confirmReturn()">
Confirm Return
</button>

</div>

</div>


<script>

/* Logout */

function logout(){
if(confirm("Logout?")){
localStorage.clear();
window.location.href="login.html";
}
}


/* Get Request ID */

const params = new URLSearchParams(window.location.search);
const requestId = params.get("id");

let returnItems=[];


/* Load Return Details */

fetch(`/api/incharge/return-details/${requestId}`)
.then(res=>res.json())
.then(data=>{

if(!data.success){

alert("Return details not found or already returned");
window.location.href="student_requests.html";
return;

}

document.getElementById("name").innerText=data.student.name;
document.getElementById("email").innerText=data.student.email;

const table=document.getElementById("itemsTable");

data.items.forEach((item,index)=>{

returnItems.push(item);

table.innerHTML+=`

<tr>

<td>${item.equipment_name}</td>

<td>${item.issued_quantity}</td>

<td><input type="number" min="0" value="0" id="no-${index}"></td>

<td><input type="number" min="0" value="0" id="light-${index}"></td>

<td><input type="number" min="0" value="0" id="medium-${index}"></td>

<td><input type="number" min="0" value="0" id="heavy-${index}"></td>

<td><input type="number" min="0" value="0" id="remove-${index}"></td>

<td><input type="number" min="0" value="0" id="penalty-${index}"></td>

</tr>

`;

});

});


/* Confirm Return */

function confirmReturn(){

const returned=[];

for(let i=0;i<returnItems.length;i++){

const item=returnItems[i];

const noDamage=parseInt(document.getElementById(`no-${i}`).value)||0;
const light=parseInt(document.getElementById(`light-${i}`).value)||0;
const medium=parseInt(document.getElementById(`medium-${i}`).value)||0;
const heavy=parseInt(document.getElementById(`heavy-${i}`).value)||0;
const remove=parseInt(document.getElementById(`remove-${i}`).value)||0;
const penalty=parseInt(document.getElementById(`penalty-${i}`).value)||0;

const totalReturned=noDamage+light+medium+heavy;

/* validation */

if(totalReturned > item.issued_quantity){

alert(`Returned quantity exceeds issued quantity for ${item.equipment_name}`);
return;

}

returned.push({

equipment_id:item.equipment_id,

no_damage:noDamage,
light:light,
medium:medium,
heavy:heavy,

remove:remove,
penalty:penalty

});

}


fetch("/api/incharge/return",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
request_id:requestId,
items:returned
})

})
.then(res=>res.json())
.then(data=>{

alert("Return processed successfully");

window.location.href="student_requests.html";

})
.catch(err=>{

console.error(err);
alert("Return failed");

});

}

</script>

</body>

</html>

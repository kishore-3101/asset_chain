<!DOCTYPE html>
<html>

<head>

<title>Incharge Requests</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#f4f6f9;
margin:0;
}

/* SIDEBAR */

.sidebar{
height:100vh;
background:linear-gradient(180deg,#1e293b,#0f172a);
color:white;
padding:25px;
}

.sidebar h3{
color:#38bdf8;
margin-bottom:30px;
}

.menu-item{
padding:12px;
margin-bottom:10px;
border-radius:8px;
cursor:pointer;
}

.menu-item:hover{
background:#334155;
}

/* MAIN */

.dashboard{
padding:40px;
}

/* CARD */

.card-box{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 8px 18px rgba(0,0,0,0.08);
}

/* STATUS */

.status{
padding:6px 12px;
border-radius:20px;
font-size:13px;
font-weight:600;
}

.pending{
background:#fef3c7;
color:#92400e;
}

.approved{
background:#d1fae5;
color:#047857;
}

.rejected{
background:#fee2e2;
color:#b91c1c;
}

</style>

</head>

<body>

<div class="container-fluid">

<div class="row">

<!-- SIDEBAR -->

<div class="col-md-2 sidebar">

<h3>AssetChain</h3>

<div class="menu-item" onclick="goDashboard()">Dashboard</div>

<div class="menu-item">Incharge Requests</div>

<div class="menu-item" onclick="logout()">Logout</div>

</div>


<!-- MAIN -->

<div class="col-md-10 dashboard">

<div class="d-flex justify-content-between">

<h2>Equipment Requests</h2>

<button class="btn btn-secondary" onclick="goBack()">← Back</button>

</div>


<div class="card-box mt-4">

<table class="table">

<thead>

<tr>
<th>Lab</th>
<th>Product</th>
<th>Quantity</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody id="requests_table"></tbody>

</table>

</div>

</div>

</div>

</div>


<script src="/js/head_requests.js"></script>

<script>

function goBack(){
window.location.href="lab_inventory.html";
}

function goDashboard(){
window.location.href="head_dashboard.html";
}

function logout(){
localStorage.clear();
window.location.href="login.html";
}

</script>

</body>

</html>

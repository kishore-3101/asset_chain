<!DOCTYPE html>
<html>

<head>

<title>CIT Inventory Management</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{

font-family:'Poppins',sans-serif;

background:
linear-gradient(rgba(0, 225, 255, 0.509), rgba(255, 0, 0, 0.168)),
url("images/login-bg.jpg");

background-size:cover;
background-position:center;
background-repeat:no-repeat;

height:100vh;
display:flex;
align-items:center;
justify-content:center;

}

/* College Header */

.college-header{
    position:absolute;
    top:40px;
    width:100%;
    text-align:center;
    color:rgb(0, 0, 0);
    z-index:2;
}

.college-header h1{
    font-size:36px;
    font-weight:700;
    letter-spacing:1px;
    text-shadow:0 3px 10px rgba(0,0,0,0.7);
}

.college-header p{
    font-size:18px;
    margin-top:5px;
    letter-spacing:1px;
    color:#424549;
}

/* Login Card */

.login-card{

width:420px;
padding:35px;
border-radius:14px;

background:rgba(255,255,255,0.9);

backdrop-filter:blur(8px);

box-shadow:0 10px 30px rgba(0,0,0,0.2);

}

.login-title{
text-align:center;
margin-bottom:20px;
font-weight:600;
color:#4f46e5;
}

/* Tabs */

.tabs{
display:flex;
margin-bottom:25px;
}

.tab{
flex:1;
text-align:center;
padding:10px;
cursor:pointer;
border-bottom:2px solid transparent;
font-weight:500;
}

.tab.active{
border-bottom:2px solid #6366f1;
color:#6366f1;
}

/* Inputs */

.form-control{
border-radius:8px;
padding:10px;
}

/* Button */

.btn-login{
background:linear-gradient(135deg,#6366f1,#4f46e5);
border:none;
border-radius:8px;
padding:10px;
color:white;
font-weight:500;
}

.btn-login:hover{
opacity:0.9;
}

/* Register link */

.register-link{
text-align:center;
margin-top:10px;
}

</style>

</head>

<body>

<!-- College Header -->

<div class="college-header">

<h2><b>Chennai Institute of Technology</b></h2>

<p>Inventory Management System</p>

</div>


<!-- Login Card -->

<div class="login-card">

<h4 class="login-title">Login</h4>

<!-- Tabs -->

<div class="tabs">

<div class="tab active" onclick="showHeadLogin()">
Head / Incharge
</div>

<div class="tab" onclick="showStudentLogin()">
Student
</div>

</div>

<!-- Head Login -->

<div id="head_login">

<input id="email" class="form-control mb-3" placeholder="Email">
<input id="password" type="password" class="form-control mb-3" placeholder="Password">

<button class="btn btn-login w-100" onclick="login()">
Login
</button>

</div>

<!-- Student Login -->

<!-- Student Login -->

<div id="student_login" style="display:none">

<input id="student_email" class="form-control mb-3" placeholder="Student Email">

<input id="student_password" type="password" class="form-control mb-3" placeholder="Password">

<button class="btn btn-login w-100" onclick="studentLogin()">
Login
</button>

<div class="register-link">
<a href="register.html">Create Student Account</a>
</div>

</div>

<div class="register-link">



</div>

</div>

</div>

<script src="js/login.js"></script>

<script>

function showHeadLogin(){

document.getElementById("head_login").style.display="block";
document.getElementById("student_login").style.display="none";

document.querySelectorAll(".tab")[0].classList.add("active");
document.querySelectorAll(".tab")[1].classList.remove("active");

}

function showStudentLogin(){

document.getElementById("head_login").style.display="none";
document.getElementById("student_login").style.display="block";

document.querySelectorAll(".tab")[1].classList.add("active");
document.querySelectorAll(".tab")[0].classList.remove("active");

}

</script>

</body>

</html>

<!DOCTYPE html>
<html>

<head>

<title>Create Lab</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#f4f6f9;
}

/* Sidebar */

.sidebar{
height:100vh;
background:linear-gradient(180deg,#1e293b,#0f172a);
color:white;
padding:25px;
}

.sidebar h3{
color:#38bdf8;
font-weight:600;
margin-bottom:30px;
}

.menu-item{
padding:12px;
margin-bottom:10px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.menu-item:hover{
background:#334155;
}

/* Dashboard */

.dashboard{
padding:40px;
}

/* Cards */

.card-box{
background:white;
border-radius:14px;
padding:25px;
box-shadow:0px 8px 18px rgba(0,0,0,0.1);
}

/* Table */

table{
background:white;
border-radius:10px;
overflow:hidden;
}

.header-bar{
display:flex;
justify-content:space-between;
align-items:center;
width:100%;
margin-bottom:30px;
}

.btn-back{
background:#334155;
color:white;
border:none;
padding:8px 18px;
border-radius:8px;
font-weight:500;
transition:0.3s;
}

.btn-back:hover{
background:#1e293b;
}

</style>

</head>

<body>

<div class="container-fluid">

<div class="row">

<!-- Sidebar -->

<div class="col-md-2 sidebar">

<h3>AssetChain</h3>

<div class="menu-item" onclick="goDashboard()">Dashboard</div>
<div class="menu-item">Lab Inventory</div>
<div class="menu-item">Transport</div>
<div class="menu-item">Reports</div>

</div>


<!-- Main Content -->

<div class="col-md-10 dashboard">

<div class="header-bar">

<h2>Create Lab</h2>

<button class="btn-back" onclick="goBack()">← Back</button>

</div>

<div class="row mt-4">

<!-- Create Lab Card -->

<div class="col-md-4">

<div class="card-box">

<h4>Add New Lab</h4>

<input
id="lab_name"
class="form-control mt-3"
placeholder="Enter Lab Name"
>

<button
class="btn btn-primary mt-3 w-100"
onclick="createLab()"
>

Create Lab

</button>

<p id="lab_message" class="mt-2"></p>

</div>

</div>


<!-- Existing Labs Table -->

<div class="col-md-8">

<div class="card-box">

<h4>Existing Labs</h4>

<table class="table mt-3">

<thead>

<tr>
<th>ID</th>
<th>Lab Name</th>
<th>Actions</th>
</tr>

</thead>

<tbody id="labs_table">

</tbody>

</table>

</div>

</div>

</div>

</div>

</div>

</div>

<script src="js/head.js"></script>

</body>

</html>

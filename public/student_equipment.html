<!DOCTYPE html>
<html>

<head>

<title>Lab Equipment</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#f4f6f9;
margin:0;
}

/* Sidebar */

.sidebar{
position:fixed;
left:0;
top:0;
width:230px;
height:100%;
background:#111827;
color:white;
padding-top:20px;
}

.sidebar h4{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
transition:0.3s;
}

.sidebar a:hover{
background:#374151;
}

.logout{
position:absolute;
bottom:20px;
width:100%;
}

.logout-btn{
display:block;
margin:10px 20px;
padding:10px;
text-align:center;
background:#ef4444;
color:white;
border-radius:8px;
text-decoration:none;
}

.logout-btn:hover{
background:#dc2626;
}

/* Main */

.main{
margin-left:230px;
padding:40px;
}

/* Cards */

.asset-card{

background:white;
border-radius:14px;
padding:30px;
text-align:center;
cursor:pointer;
transition:0.3s;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
height:160px;

display:flex;
flex-direction:column;
justify-content:center;

}

.asset-card:hover{
transform:translateY(-6px);
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.asset-card i{
font-size:36px;
margin-bottom:10px;
color:#4f46e5;
}

.asset-card h5{
font-weight:600;
}

.asset-card p{
font-size:14px;
color:#6b7280;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h4>CIT Assets</h4>

<a href="student_dashboard.html">Dashboard</a>

<a href="student_equipment.html">Lab Equipment</a>

<a href="#">Transport</a>

<a href="#">Library Assets</a>

<div class="logout">
<a href="#" class="logout-btn" onclick="logout()">Logout</a>
</div>

</div>

<!-- Main Content -->

<div class="main">

<h2 class="mb-4 fw-bold">🔬 Lab Equipment</h2><br>

<div class="row g-4">

<div class="col-md-3">

<div class="asset-card" onclick="raiseRequest()">

<i class="fas fa-flask"></i>

<h5>Raise Request</h5>

<p>Request lab equipment</p>

</div>

</div>

<div class="col-md-3">

<div class="asset-card" onclick="openCart()">

<i class="fas fa-shopping-cart"></i>

<h5>Cart</h5>

<p>View selected equipment</p>

</div>

</div>

<div class="col-md-3">

<div class="asset-card" onclick="previousRequests()">

<i class="fas fa-clock-rotate-left"></i>

<h5>Previous Requests</h5>

<p>View request history</p>

</div>

</div>

<div class="col-md-3">

<div class="asset-card" onclick="penalties()">

<i class="fas fa-triangle-exclamation"></i>

<h5>Penalties</h5>

<p>Check fines or penalties</p>

</div>

</div>

</div>

</div>

<script>

function logout(){

if(confirm("Are you sure you want to logout?")){

localStorage.removeItem("student");

window.location.href="login.html";

}

}

function raiseRequest(){
window.location.href="raise_request.html";
}

function openCart(){
window.location.href="cart.html";
}

function previousRequests(){
window.location.href="previous_requests.html";
}

function penalties(){
window.location.href="penalties.html";
}

</script>

</body>

</html>

<!DOCTYPE html>
<html>

<head>

<title>My Penalties</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#eef2f7;
margin:0;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:230px;
height:100%;
background:#0f172a;
color:white;
padding-top:20px;
}

.sidebar h4{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
}

.sidebar a:hover{
background:#1e293b;
}

.logout{
position:absolute;
bottom:20px;
width:100%;
}

.logout-btn{
display:block;
margin:10px 20px;
padding:10px;
text-align:center;
background:#ef4444;
color:white;
border-radius:8px;
text-decoration:none;
}

.main{
margin-left:230px;
padding:40px;
}

.card{
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.no-data{
text-align:center;
padding:20px;
color:#64748b;
font-weight:500;
}

</style>

</head>

<body>

<div class="sidebar">

<h4>CIT Assets</h4>

<a href="student_dashboard.html">Dashboard</a>
<a href="my_requests.html">My Requests</a>
<a href="penalties.html">My Penalties</a>

<div class="logout">
<a href="#" class="logout-btn" onclick="logout()">Logout</a>
</div>

</div>

<div class="main">

<h2 class="mb-4 fw-bold">My Penalties</h2>

<div class="card p-4">

<div class="table-responsive">

<table class="table">

<thead class="table-dark">

<tr>
<th>Request ID</th>
<th>Equipment</th>
<th>Penalty Amount</th>
<th>Status</th>
</tr>

</thead>

<tbody id="penaltyTable"></tbody>

</table>

</div>

</div>

</div>

<script>

/* LOGOUT */

function logout(){

if(confirm("Logout?")){
localStorage.clear();
window.location.href="login.html";
}

}

/* GET STUDENT DATA FROM LOCALSTORAGE */

const studentData = JSON.parse(localStorage.getItem("student"));

if(!studentData){

alert("Please login first");
window.location.href="login.html";

}

/* STUDENT ID */

const studentId = studentData.id;

/* LOAD PENALTIES */

fetch(`/api/student/penalties/${studentId}`)

.then(res=>res.json())

.then(data=>{

console.log("Penalty API:",data);

const table = document.getElementById("penaltyTable");

table.innerHTML="";

if(!data.success || data.penalties.length===0){

table.innerHTML = `
<tr>
<td colspan="4" class="no-data">No penalties found</td>
</tr>
`;

return;

}

data.penalties.forEach(p=>{

let badge = p.status==="pending"
? '<span class="badge bg-danger">Pending</span>'
: '<span class="badge bg-success">Paid</span>';

table.innerHTML += `
<tr>
<td>${p.request_id}</td>
<td>${p.equipment_name}</td>
<td>₹ ${p.penalty_amount}</td>
<td>${badge}</td>
</tr>
`;

});

})

.catch(err=>{

console.error(err);

document.getElementById("penaltyTable").innerHTML=`
<tr>
<td colspan="4" class="no-data">Error loading penalties</td>
</tr>
`;

});

</script>

</body>
</html>

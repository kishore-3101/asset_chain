<!DOCTYPE html>
<html>

<head>

<title>Cart</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#eef2f7;
margin:0;
}

/* Sidebar */

.sidebar{
position:fixed;
left:0;
top:0;
width:230px;
height:100%;
background:#0f172a;
color:white;
padding-top:20px;
}

.sidebar h4{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
}

.sidebar a:hover{
background:#1e293b;
}

.logout{
position:absolute;
bottom:20px;
width:100%;
}

.logout-btn{
display:block;
margin:10px 20px;
padding:10px;
text-align:center;
background:#ef4444;
color:white;
border-radius:8px;
text-decoration:none;
}

/* Main */

.main{
margin-left:230px;
padding:40px;
}

/* Table */

.cart-table{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.qty-input{
width:70px;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h4>CIT Assets</h4>

<a href="student_dashboard.html">Dashboard</a>
<a href="student_equipment.html">Lab Equipment</a>
<a href="cart.html">Cart</a>

<div class="logout">
<a href="#" class="logout-btn" onclick="logout()">Logout</a>
</div>

</div>

<!-- Main -->

<div class="main">

<div class="d-flex justify-content-between align-items-center mb-4">

<h2 class="fw-bold">Cart</h2>

<button class="btn btn-secondary" onclick="goBack()">← Back</button>

</div>

<div class="cart-table">

<table class="table mb-0">

<thead class="table-dark">

<tr>
<th>Equipment</th>
<th>Quantity</th>
<th>Update</th>
<th>Remove</th>
</tr>

</thead>

<tbody id="cartTable"></tbody>

</table>

</div>

<div class="mt-4">

<button class="btn btn-danger" onclick="clearCart()">Clear Cart</button>

<button class="btn btn-primary" onclick="submitRequest()">Submit Request</button>

<button class="btn btn-success" onclick="showRequestQR()">
Show Request QR
</button>

</div>

</div>

<script>

/* Logout */

function logout(){

if(confirm("Are you sure you want to logout?")){

localStorage.removeItem("student");
localStorage.removeItem("cart");
localStorage.removeItem("current_lab");

window.location.href="login.html";

}

}

/* Back */

function goBack(){
window.history.back();
}

/* Load Cart */

function loadCart(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const table = document.getElementById("cartTable");

table.innerHTML="";

cart.forEach((item,index)=>{

table.innerHTML+=`

<tr>

<td>${item.equipment_name}</td>

<td>
<input 
type="number"
value="${item.quantity}"
min="1"
class="form-control qty-input"
id="qty-${index}"
>
</td>

<td>
<button class="btn btn-warning btn-sm"
onclick="updateItem(${index})">
Update
</button>
</td>

<td>
<button class="btn btn-danger btn-sm"
onclick="removeItem(${index})">
Remove
</button>
</td>

</tr>

`;

});

}

loadCart();


/* Update item */

function updateItem(index){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const qty = parseInt(document.getElementById(`qty-${index}`).value);

cart[index].quantity = qty;

localStorage.setItem("cart",JSON.stringify(cart));

alert("Cart updated");

}


/* Remove item */

function removeItem(index){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

cart.splice(index,1);

localStorage.setItem("cart",JSON.stringify(cart));

loadCart();

}


/* Clear cart */

function clearCart(){

if(confirm("Clear all items from cart?")){

localStorage.removeItem("cart");

loadCart();

}

}


/* Submit request */

function submitRequest(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

if(cart.length === 0){
alert("Cart is empty");
return;
}

const student = JSON.parse(localStorage.getItem("student"));
const labId = localStorage.getItem("current_lab");

fetch("/api/student/submit-request",{

method:"POST",
headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
student_id: student.id,
lab_id: labId,
items: cart
})

})
.then(res=>res.json())
.then(data=>{

if(!data.success){
alert("Failed to submit request");
return;
}

/* clear cart */

localStorage.removeItem("cart");

/* redirect to qr page */

window.location.href = `request_qr.html?id=${data.request_id}`;

})
.catch(err=>{
console.error(err);
alert("Server error");
});

}


/* Show QR */

function showQR(qr){

const win = window.open("");

win.document.write(`

<html>

<head>

<title>Request QR</title>

<style>

body{
font-family:Arial;
text-align:center;
padding:40px;
}

</style>

</head>

<body>

<h2>Request Submitted Successfully</h2>

<p>Show this QR code to the Lab Incharge</p>

<img src="${qr}" width="300">

</body>

</html>

`);

}


/* Show previous QR */

function showRequestQR(){

const requestId = localStorage.getItem("last_request_id");

if(!requestId){
alert("No request found");
return;
}

fetch("/api/student/request-qr/"+requestId)

.then(res=>res.json())
.then(data=>{

if(!data.success){
alert("QR not found");
return;
}

showQR(data.qr);

});

}

</script>

</body>

</html>

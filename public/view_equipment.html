<!DOCTYPE html>
<html>

<head>

<title>View Equipment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="/css/style.css">
<style>
    /* ===== BODY ===== */

body{
font-family:'Poppins',sans-serif;
margin:0;
background:#f1f5f9;
}


/* ===== SIDEBAR ===== */

.sidebar{
position:fixed;
left:0;
top:0;
height:100%;
width:240px;
background:#1e293b;
color:white;
padding:25px 20px;
}

.sidebar h3{
text-align:center;
margin-bottom:30px;
font-weight:600;
}

/* sidebar menu items */

.menu-item{
padding:12px;
margin-bottom:10px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.menu-item:hover{
background:#334155;
}

/* logout button */

.logout{
background:#ef4444;
text-align:center;
}

.logout:hover{
background:#dc2626;
}


/* ===== MAIN CONTENT ===== */

.main{
margin-left:260px;
padding:30px;
min-height:100vh;
}


/* page title */

.main h2{
font-weight:600;
color:#1e293b;
}


/* ===== CARD ===== */

.card{
border:none;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}


/* ===== TABLE ===== */

.table{
margin-top:10px;
}

.table thead{
font-weight:600;
}

.table-hover tbody tr:hover{
background:#f8fafc;
}


/* ===== DAMAGE COLORS ===== */

.text-warning{
font-weight:600;
}

.text-danger{
font-weight:600;
}

.text-dark{
font-weight:600;
}


/* ===== BUTTONS ===== */

.btn-primary{
background:#4f46e5;
border:none;
}

.btn-primary:hover{
background:#4338ca;
}

.btn-secondary{
background:#64748b;
border:none;
}

.btn-secondary:hover{
background:#475569;
}


/* ===== INPUT FIELDS ===== */

.form-control{
border-radius:8px;
}


/* ===== RESPONSIVE ===== */

@media(max-width:900px){

.sidebar{
width:200px;
}

.main{
margin-left:220px;
}

}

@media(max-width:700px){

.sidebar{
position:relative;
width:100%;
height:auto;
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.menu-item{
margin:5px;
}

.main{
margin-left:0;
}

}
</style>

</head>

<body class="light">

<!-- SIDEBAR -->

<div class="sidebar">

<h3>AssetChain</h3>

<div class="menu-item" onclick="window.location.href='incharge_dashboard.html'">
Dashboard
</div>

<div class="menu-item" onclick="openAddEquipment()">
Add Equipment
</div>

<div class="menu-item">
View Equipment
</div>

<div class="menu-item" onclick="openStudentRequests()">
Student Requests
</div>

<div class="menu-item" onclick="openBorrowed()">
Borrowed Items
</div>

<div class="menu-item" onclick="openPurchaseRequest()">
Equipment Request
</div>
        

</div>


<!-- MAIN CONTENT -->

<div class="main">

<div class="d-flex justify-content-between align-items-center">

<h2>Equipment Status</h2>

<button class="btn btn-secondary" onclick="goBack()">
← Back
</button>

</div>


<div class="card p-4 mt-4 shadow-sm">

<h5 class="mb-3">Lab Equipment Overview</h5>

<table class="table table-hover">

<thead class="table-light">

<tr>
<th>ID</th>
<th>Equipment</th>
<th>Total</th>
<th>Available</th>
<th>Issued</th>
<th class="text-warning">Light Damage</th>
<th class="text-danger">Medium Damage</th>
<th class="text-dark">Heavy Damage</th>
</tr>

</thead>

<tbody id="equipment_status">

</tbody>

</table>

</div>

</div>


<!-- JS FILES -->

<script src="/js/incharge.js"></script>
<script src="/js/view_equipment.js"></script>

<script>

function goBack(){
window.location.href = "incharge_dashboard.html";
}

</script>

</body>

</html>

<!DOCTYPE html>
<html>

<head>

<title>Borrowed Details</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
background:#eef2f7;
}

/* Sidebar */

.sidebar{
position:fixed;
left:0;
top:0;
width:230px;
height:100%;
background:#0f172a;
color:white;
padding-top:20px;
}

.sidebar h4{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
}

.sidebar a:hover{
background:#1e293b;
}

.logout{
position:absolute;
bottom:20px;
width:100%;
}

.logout-btn{
display:block;
margin:10px 20px;
padding:10px;
text-align:center;
background:#ef4444;
color:white;
border-radius:8px;
text-decoration:none;
}

/* Main */

.main{
margin-left:230px;
padding:40px;
}

/* Cards */

.card{
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

/* Table */

.table th{
text-align:center;
}

.table td{
text-align:center;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h4>CIT Assets</h4>

<a href="incharge_dashboard.html">Dashboard</a>
<a href="student_requests.html">Student Requests</a>
<a href="borrowed_items.html">Borrowed Items</a>

<div class="logout">
<a href="#" class="logout-btn" onclick="logout()">Logout</a>
</div>

</div>


<!-- Main -->

<div class="main">

<!-- HEADER -->

<div class="d-flex justify-content-between align-items-center mb-4">

<h2 class="fw-bold">Borrowed Details</h2>

<a href="borrowed_items.html" class="btn btn-secondary">
← Back
</a>

</div>


<!-- Student Info -->

<div class="card p-4 mb-4">

<h5 class="mb-3">Student Information</h5>

<p><b>Name:</b> <span id="name"></span></p>

<p><b>Email:</b> <span id="email"></span></p>

<p><b>Department:</b> <span id="dept"></span></p>

<p><b>Phone:</b> <span id="phone"></span></p>

</div>


<!-- Equipment -->

<div class="card p-4">

<h5 class="mb-3">Borrowed Equipments</h5>

<div class="table-responsive">

<table class="table">

<thead class="table-dark">

<tr>
<th>Equipment</th>
<th>Issued Quantity</th>
</tr>

</thead>

<tbody id="items"></tbody>

</table>

</div>

</div>

</div>


<script>

/* logout */

function logout(){

if(confirm("Logout?")){
localStorage.clear();
window.location.href="login.html";
}

}

/* get request id */

const params = new URLSearchParams(window.location.search);
const requestId = params.get("id");

/* fetch details */

fetch(`/api/incharge/borrowed-details/${requestId}`)
.then(res=>res.json())
.then(data=>{

document.getElementById("name").innerText = data.student.name;
document.getElementById("email").innerText = data.student.email;
document.getElementById("dept").innerText = data.student.department;
document.getElementById("phone").innerText = data.student.contact_number;

const table = document.getElementById("items");

table.innerHTML="";

data.items.forEach(i=>{

table.innerHTML += `
<tr>
<td>${i.equipment_name}</td>
<td>${i.issued_quantity}</td>
</tr>
`;

});

});

</script>

</body>

</html>

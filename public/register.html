<!DOCTYPE html>
<html>

<head>

<title>Student Registration</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;

background:
linear-gradient(rgba(0,225,255,0.5), rgba(255,0,0,0.15)),
url("images/login-bg.jpg");

background-size:cover;
background-position:center;
background-repeat:no-repeat;

height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.register-card{

width:450px;
padding:35px;
border-radius:14px;

background:rgba(255,255,255,0.9);

backdrop-filter:blur(8px);

box-shadow:0 10px 30px rgba(0,0,0,0.2);

}

.title{
text-align:center;
margin-bottom:20px;
font-weight:600;
color:#4f46e5;
}

.btn-register{
background:linear-gradient(135deg,#6366f1,#4f46e5);
border:none;
border-radius:8px;
padding:10px;
color:white;
font-weight:500;
}

</style>

</head>

<body>

<div class="register-card">

<h4 class="title">Create Student Account</h4>

<input id="name" class="form-control mb-3" placeholder="Student Name">

<input id="contact" class="form-control mb-3" placeholder="Contact Number">

<input id="email" class="form-control mb-3" placeholder="College Email (@citchennai.net)">

<select id="department" class="form-control mb-3">

<option value="">Select Department</option>

<option>CSE</option>
<option>Cybersecurity</option>
<option>IT</option>
<option>CSBS</option>
<option>AIDS</option>
<option>AIML</option>
<option>ECE</option>
<option>ACT</option>
<option>VLSI</option>
<option>BME</option>
<option>Civil</option>
<option>Mechanical</option>
<option>Mechatronics</option>

</select>

<input id="password" type="password" class="form-control mb-3" placeholder="Password">

<input id="confirm_password" type="password" class="form-control mb-3" placeholder="Confirm Password">

<button class="btn btn-register w-100" onclick="registerStudent()">
Create Account
</button>

<p class="text-center mt-3">
Already have an account?
<a href="login.html">Login</a>
</p>

</div>

<script>

function registerStudent(){

const name=document.getElementById("name").value;
const contact=document.getElementById("contact").value;
const email=document.getElementById("email").value;
const department=document.getElementById("department").value;
const password=document.getElementById("password").value;
const confirm=document.getElementById("confirm_password").value;

/* password confirmation */

if(password!==confirm){
alert("Passwords do not match");
return;
}

/* email validation */

if(!email.endsWith("@citchennai.net")){
alert("Use college email (@citchennai.net)");
return;
}

fetch("/api/student/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name,
contact,
email,
department,
password
})

})
.then(res=>res.json())
.then(data=>{

if(data.success){
alert("Account created successfully");

window.location.href="login.html";

}else{

alert(data.message);

}

});

}

</script>

</body>

</html>

<!DOCTYPE html>
<html>

<head>

<title>Scan QR</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:'Poppins',sans-serif;
background:#eef2f7;
margin:0;
}

/* Sidebar */

.sidebar{
position:fixed;
left:0;
top:0;
width:230px;
height:100%;
background:#0f172a;
color:white;
padding-top:20px;
}

.sidebar h4{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
}

.sidebar a:hover{
background:#1e293b;
}

/* Logout */

.logout{
position:absolute;
bottom:20px;
width:100%;
}

.logout-btn{
display:block;
margin:10px 20px;
padding:10px;
text-align:center;
background:#ef4444;
color:white;
border-radius:8px;
text-decoration:none;
}

/* Main Content */

.main{
margin-left:230px;
padding:40px;
}

/* Scanner Card */

.scan-card{
background:white;
padding:30px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
text-align:center;
max-width:500px;
margin:auto;
}

/* QR Reader */

#reader{
width:100%;
border-radius:10px;
overflow:hidden;
}

/* Title */

.scan-title{
font-weight:600;
margin-bottom:20px;
}

/* Instruction */

.scan-text{
color:#6b7280;
margin-top:10px;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h4>CIT Assets</h4>

<a href="incharge_dashboard.html">Dashboard</a>
<a href="student_requests.html">Student Requests</a>
<a href="scan_qr.html">Scan QR</a>

<div class="logout">
<a href="#" class="logout-btn" onclick="logout()">Logout</a>
</div>

</div>

<!-- Main Content -->

<div class="main">

<div class="d-flex justify-content-between align-items-center mb-4">

<h2 class="fw-bold">Scan Request QR</h2>

<a href="student_requests.html" class="btn btn-secondary">
← Back
</a>

</div>

<div class="scan-card">

<h4 class="scan-title">QR Scanner</h4>

<div id="reader"></div>

<p class="scan-text">
Point the camera at the student's QR code
</p>

</div>

</div>

<script>

/* Logout */

function logout(){

if(confirm("Are you sure you want to logout?")){

localStorage.clear();
window.location.href="login.html";

}

}

/* QR Scan Success */

function onScanSuccess(decodedText){

console.log("QR scanned:", decodedText);

/*
Example QR:
http://localhost:3000/incharge/request/25
*/

window.location.href = decodedText;

}

/* Scan Error */

function onScanError(error){
console.warn(error);
}

/* Start Scanner */

let scanner = new Html5QrcodeScanner(
"reader",
{
fps:10,
qrbox:250
}
);

scanner.render(onScanSuccess, onScanError);

</script>

</body>

</html>
